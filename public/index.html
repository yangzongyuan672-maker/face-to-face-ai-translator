<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#090909">
    <title>Face-to-Face AI Translator</title>
    <meta name="description" content="手机浏览器使用的中英面对面双向实时翻译器。">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="translator" aria-label="面对面翻译器">
      <section class="pane pane-peer" aria-label="对方查看">
        <div class="content rotated">
          <div class="caption-stack" id="peerCaptions">
            <article class="caption active">
              <p class="caption-source"></p>
              <p class="caption-translation">Listening...</p>
            </article>
          </div>
        </div>
      </section>

      <section class="control-strip" aria-label="控制区">
        <button class="history-button" id="historyButton" type="button" aria-label="历史记录">历史</button>
        <div class="control-center">
          <button class="listen-button" id="startButton" type="button" aria-label="开始翻译">
            <span class="dot"></span>
            <span class="dot"></span>
          </button>
          <p id="statusText">点击开始</p>
        </div>
        <span aria-hidden="true"></span>
      </section>

      <section class="pane pane-self" aria-label="自己查看">
        <div class="content">
          <div class="caption-stack" id="selfCaptions">
            <article class="caption active">
              <p class="caption-source"></p>
              <p class="caption-translation">请说话...</p>
            </article>
          </div>
        </div>
      </section>
    </main>

    <aside class="history-sheet" id="historySheet" aria-hidden="true">
      <div class="history-panel">
        <header>
          <p>历史记录 <span id="historyCount">0 / 20</span></p>
          <button id="clearButton" type="button">清空</button>
          <button id="closeHistoryButton" type="button" aria-label="关闭历史记录">×</button>
        </header>
        <div class="history-list" id="historyList"></div>
      </div>
    </aside>

    <template id="historyItemTemplate">
      <article class="history-item">
        <time></time>
        <p class="history-original"></p>
        <p class="history-translation"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
